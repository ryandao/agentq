name: CI

on:
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm test

  sdk:
    name: SDK (lint + test)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - run: pip install -e ".[dev]"
      - run: python -c "import agentq; print('import ok')"
      - run: python -m pytest tests/ -v --tb=short --cov=agentq --cov-report=term-missing
