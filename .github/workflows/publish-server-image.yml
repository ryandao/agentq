name: Publish Server Image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional override for the published image tag"
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'server-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image metadata
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_IMAGE_TAG: ${{ github.event.inputs.image_tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
          SHA: ${{ github.sha }}
        run: |
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/agentq-server"

          if [ "$EVENT_NAME" = "release" ]; then
            VERSION_TAG="${RELEASE_TAG#server-v}"
            if [ "$VERSION_TAG" = "$RELEASE_TAG" ] || [ -z "$VERSION_TAG" ]; then
              echo "Expected a release tag like server-v0.1.0, got: $RELEASE_TAG" >&2
              exit 1
            fi
          elif [ -n "$INPUT_IMAGE_TAG" ]; then
            VERSION_TAG="$INPUT_IMAGE_TAG"
          else
            VERSION_TAG="sha-${SHA::12}"
          fi

          {
            echo "image_name=$IMAGE_NAME"
            echo "version_tag=$VERSION_TAG"
            echo "sha_tag=sha-${SHA::12}"
          } >> "$GITHUB_OUTPUT"

          if [ "$EVENT_NAME" = "release" ] && [ "$RELEASE_PRERELEASE" != "true" ]; then
            echo "publish_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker tags
        id: docker-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.meta.outputs.image_name }}
          tags: |
            type=raw,value=${{ steps.meta.outputs.version_tag }}
            type=raw,value=${{ steps.meta.outputs.sha_tag }}
            type=raw,value=latest,enable=${{ steps.meta.outputs.publish_latest == 'true' }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: server
          file: server/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}
