name: Deploy Server to AWS App Runner

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/deploy-server.yml'

env:
  ECR_REPOSITORY: agentq-server
  SERVICE_NAME: agentq-server

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-west-2' }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --platform linux/amd64 \
            -f server/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            server/
          docker push $ECR_REGISTRY/$ECR_REPOSITORY --all-tags
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Deploy to App Runner
        run: |
          aws apprunner update-service \
            --service-arn "${{ secrets.APPRUNNER_SERVICE_ARN }}" \
            --source-configuration '{
              "ImageRepository": {
                "ImageIdentifier": "${{ steps.build.outputs.image }}",
                "ImageRepositoryType": "ECR",
                "ImageConfiguration": {
                  "Port": "3000",
                  "RuntimeEnvironmentVariables": {
                    "DB_HOST": "${{ secrets.DB_HOST }}",
                    "DB_PORT": "${{ secrets.DB_PORT }}",
                    "DB_USER": "${{ secrets.DB_USER }}",
                    "DB_PASSWORD": "${{ secrets.DB_PASSWORD }}",
                    "DB_NAME": "${{ secrets.DB_NAME }}",
                    "DB_SCHEMA": "${{ secrets.DB_SCHEMA }}",
                    "AGENTQ_REDIS_URL": "${{ secrets.AGENTQ_REDIS_URL }}",
                    "AGENTQ_TASK_QUEUE_SYSTEM": "celery",
                    "AGENTQ_DEFAULT_QUEUE_NAME": "celery",
                    "AGENTQ_CELERY_CONTROL_EXCHANGE": "celery",
                    "AGENTQ_CELERY_INSPECT_TIMEOUT_MS": "1000",
                    "AGENTQ_REDIS_PRIORITY_STEPS": "0,3,6,9",
                    "AGENTQ_SERVER_ADMIN_USERNAME": "${{ secrets.AGENTQ_SERVER_ADMIN_USERNAME }}",
                    "AGENTQ_SERVER_ADMIN_PASSWORD": "${{ secrets.AGENTQ_SERVER_ADMIN_PASSWORD }}",
                    "GEMINI_API_KEY": "${{ secrets.GEMINI_API_KEY }}",
                    "NODE_ENV": "production",
                    "HOSTNAME": "0.0.0.0"
                  }
                }
              },
              "AutoDeploymentsEnabled": false,
              "AuthenticationConfiguration": {
                "AccessRoleArn": "${{ secrets.APPRUNNER_ECR_ACCESS_ROLE_ARN }}"
              }
            }' \
            --instance-configuration '{
              "Cpu": "0.25 vCPU",
              "Memory": "0.5 GB"
            }' \
            --network-configuration '{
              "EgressConfiguration": {
                "EgressType": "VPC",
                "VpcConnectorArn": "${{ secrets.APPRUNNER_VPC_CONNECTOR_ARN }}"
              }
            }'

      - name: Wait for deployment
        run: |
          echo "Waiting for App Runner deployment to complete..."
          for i in $(seq 1 40); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "${{ secrets.APPRUNNER_SERVICE_ARN }}" \
              --query 'Service.Status' --output text)
            echo "[$i/40] Service status: $STATUS"
            case "$STATUS" in
              RUNNING)
                echo "Deployment complete!"
                SERVICE_URL=$(aws apprunner describe-service \
                  --service-arn "${{ secrets.APPRUNNER_SERVICE_ARN }}" \
                  --query 'Service.ServiceUrl' --output text)
                echo "Service URL: https://$SERVICE_URL"
                exit 0 ;;
              CREATE_FAILED|DELETE_FAILED|UPDATE_FAILED)
                echo "Deployment failed with status: $STATUS"
                exit 1 ;;
            esac
            sleep 15
          done
          echo "Timed out waiting for deployment (10 minutes)"
          exit 1
